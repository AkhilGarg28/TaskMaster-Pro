<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskMaster Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">

    <!-- Ambient Backgrounds -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <div class="login-container">
        
        <!-- The requested "Task" animation container -->
        <div class="animated-brand">
            <span class="animate-task">TASK</span><span class="animate-master">MASTER</span>
        </div>
        
        <div class="login-card">
            <h2 id="formTitle">Welcome Back</h2>
            <p id="formSubtitle">Enter your credentials to access your personal workspace.</p>
            
            <form id="authForm" class="login-form">
                <div class="input-group">
                    <label for="usernameInput">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="usernameInput" placeholder="e.g. john@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary login-btn">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <form id="resetForm" class="login-form" style="display: none;">
                <div class="input-group">
                    <label for="resetEmailInput">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="resetEmailInput" placeholder="e.g. john@example.com" required>
                    </div>
                </div>
                
                <button type="submit" id="resetSubmitBtn" class="btn btn-warning login-btn">
                    Send Reset Link <i class="fas fa-paper-plane"></i>
                </button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="backToLoginLink" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
                </div>
            </form>

            <form id="updatePasswordForm" class="login-form" style="display: none;">
                <div class="input-group">
                    <label for="newPasswordInput">New Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="newPasswordInput" placeholder="Enter new password (min. 6 chars)" required>
                    </div>
                </div>
                
                <button type="submit" id="updatePasswordSubmitBtn" class="btn btn-success login-btn">
                    Update Password <i class="fas fa-check-circle"></i>
                </button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" id="backToLoginFromResetLink" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
                </div>
            </form>
            
            <div class="toggle-mode">
                <span id="toggleText">Don't have an account?</span> 
                <a href="#" id="toggleModeBtn">Create one</a>
            </div>
            <div class="toggle-mode" id="forgotPasswordContainer" style="margin-top: 10px;">
                <a href="#" id="forgotPasswordLink" style="color: var(--accent-purple);">Forgot Password?</a>
            </div>
            
            <div id="authError" class="login-error hidden"></div>
        </div>
    </div>

    <!-- Supabase Client CDN & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Supabase client
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Elements
            const authForm = document.getElementById('authForm');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('authError');
            
            const formTitle = document.getElementById('formTitle');
            const formSubtitle = document.getElementById('formSubtitle');
            const toggleText = document.getElementById('toggleText');
            const toggleModeBtn = document.getElementById('toggleModeBtn');
            const forgotPasswordContainer = document.getElementById('forgotPasswordContainer');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const toggleModeDiv = document.querySelector('.toggle-mode');

            const resetForm = document.getElementById('resetForm');
            const resetEmailInput = document.getElementById('resetEmailInput');
            const resetSubmitBtn = document.getElementById('resetSubmitBtn');
            const backToLoginLink = document.getElementById('backToLoginLink');

            const updatePasswordForm = document.getElementById('updatePasswordForm');
            const newPasswordInput = document.getElementById('newPasswordInput');
            const updatePasswordSubmitBtn = document.getElementById('updatePasswordSubmitBtn');
            const backToLoginFromResetLink = document.getElementById('backToLoginFromResetLink');
            
            let isLoginMode = true;

            // Check if already logged in
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    localStorage.setItem('taskmaster_user', session.user.email);
                    window.location.href = 'index.html';
                }
            });

            // Toggle login/register mode
            toggleModeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                isLoginMode = !isLoginMode;
                errorDiv.classList.add('hidden');
                
                if (isLoginMode) {
                    formTitle.textContent = "Welcome Back";
                    formSubtitle.textContent = "Enter your credentials to access your personal workspace.";
                    submitBtn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                    toggleText.textContent = "Don't have an account?";
                    toggleModeBtn.textContent = "Create one";
                    forgotPasswordContainer.style.display = 'block';
                } else {
                    formTitle.textContent = "Create Account";
                    formSubtitle.textContent = "Register your email address to get started.";
                    submitBtn.innerHTML = 'Register <i class="fas fa-user-plus"></i>';
                    toggleText.textContent = "Already have an account?";
                    toggleModeBtn.textContent = "Sign in";
                    forgotPasswordContainer.style.display = 'none';
                }
            });

            // Form Submit Logic (Login/Signup)
            authForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = usernameInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) return;
                
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                submitBtn.disabled = true;
                errorDiv.classList.add('hidden');
                
                try {
                    let result;
                    if (isLoginMode) {
                        result = await supabaseClient.auth.signInWithPassword({ email, password });
                    } else {
                        result = await supabaseClient.auth.signUp({ email, password });
                    }
                    
                    if (result.error) throw result.error;
                    
                    // Handle signup case where email confirmation is required
                    if (!isLoginMode && result.data.user && !result.data.session) {
                        submitBtn.innerHTML = '<i class="fas fa-envelope"></i> Check Your Email';
                        submitBtn.classList.replace('btn-primary', 'btn-success');
                        errorDiv.style.color = '#4ade80';
                        errorDiv.classList.remove('hidden');
                        errorDiv.textContent = '✅ Account created! Please check your email to confirm your account, then sign in.';
                        setTimeout(() => {
                            // Switch back to login mode
                            isLoginMode = true;
                            formTitle.textContent = "Welcome Back";
                            formSubtitle.textContent = "Enter your credentials to access your personal workspace.";
                            submitBtn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
                            submitBtn.classList.replace('btn-success', 'btn-primary');
                            submitBtn.disabled = false;
                            toggleText.textContent = "Don't have an account?";
                            toggleModeBtn.textContent = "Create one";
                            forgotPasswordContainer.style.display = 'block';
                            passwordInput.value = '';
                        }, 4000);
                        return;
                    }
                    
                    // Save email as current user
                    localStorage.setItem('taskmaster_user', result.data.user.email);
                    
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
                    submitBtn.classList.replace('btn-primary', 'btn-success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                    
                } catch (error) {
                    console.error(error);
                    // Map Supabase error messages to user-friendly ones
                    let friendlyMessage = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        friendlyMessage = 'Incorrect email or password. Please try again.';
                    } else if (error.message.includes('Email not confirmed')) {
                        friendlyMessage = 'Please confirm your email address before signing in. Check your inbox.';
                    } else if (error.message.includes('User already registered')) {
                        friendlyMessage = 'An account with this email already exists. Please sign in instead.';
                    } else if (error.message.includes('Password should be at least')) {
                        friendlyMessage = 'Password must be at least 6 characters long.';
                    } else if (error.message.includes('Unable to validate email address')) {
                        friendlyMessage = 'Please enter a valid email address.';
                    }
                    errorDiv.style.color = '';
                    errorDiv.textContent = friendlyMessage;
                    errorDiv.classList.remove('hidden');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });

            // Show Forgot Password Form
            if (forgotPasswordLink) {
                forgotPasswordLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    authForm.style.display = 'none';
                    resetForm.style.display = 'block';
                    toggleModeDiv.style.display = 'none';
                    forgotPasswordContainer.style.display = 'none';
                    formTitle.textContent = 'Reset Password';
                    formSubtitle.textContent = 'Enter your email address to receive a recovery link.';
                    errorDiv.classList.add('hidden');
                });
            }

            // Back to Login Link
            if (backToLoginLink) {
                backToLoginLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetForm.style.display = 'none';
                    updatePasswordForm.style.display = 'none';
                    authForm.style.display = 'block';
                    toggleModeDiv.style.display = 'block';
                    forgotPasswordContainer.style.display = 'block';
                    formTitle.textContent = 'Welcome Back';
                    formSubtitle.textContent = 'Enter your credentials to access your personal workspace.';
                    errorDiv.classList.add('hidden');
                });
            }
            if (backToLoginFromResetLink) {
                backToLoginFromResetLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetForm.style.display = 'none';
                    updatePasswordForm.style.display = 'none';
                    authForm.style.display = 'block';
                    toggleModeDiv.style.display = 'block';
                    forgotPasswordContainer.style.display = 'block';
                    formTitle.textContent = 'Welcome Back';
                    formSubtitle.textContent = 'Enter your credentials to access your personal workspace.';
                    errorDiv.classList.add('hidden');
                });
            }

            // Reset Password Link Submission
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = resetEmailInput.value.trim();
                if (!email) return;

                const originalText = resetSubmitBtn.innerHTML;
                resetSubmitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                resetSubmitBtn.disabled = true;
                errorDiv.classList.add('hidden');

                try {
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + window.location.pathname,
                    });

                    if (error) throw error;

                    resetSubmitBtn.innerHTML = '<i class="fas fa-check"></i> Sent!';
                    resetSubmitBtn.classList.replace('btn-warning', 'btn-success');
                    alert('Password reset email sent! Please check your inbox.');
                    
                    setTimeout(() => {
                        backToLoginLink.click();
                        resetSubmitBtn.innerHTML = originalText;
                        resetSubmitBtn.classList.replace('btn-success', 'btn-warning');
                        resetSubmitBtn.disabled = false;
                        resetForm.reset();
                    }, 1500);

                } catch (error) {
                    console.error(error);
                    errorDiv.textContent = error.message;
                    errorDiv.classList.remove('hidden');
                    resetSubmitBtn.innerHTML = originalText;
                    resetSubmitBtn.disabled = false;
                }
            });

            // Update Password Submission
            updatePasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = newPasswordInput.value;
                if (!newPassword || newPassword.length < 6) {
                    alert('Password must be at least 6 characters.');
                    return;
                }

                const originalText = updatePasswordSubmitBtn.innerHTML;
                updatePasswordSubmitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
                updatePasswordSubmitBtn.disabled = true;
                errorDiv.classList.add('hidden');

                try {
                    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

                    if (error) throw error;

                    updatePasswordSubmitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
                    updatePasswordSubmitBtn.classList.replace('btn-success', 'btn-primary');
                    alert('Password updated successfully! Logging you in...');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);

                } catch (error) {
                    console.error(error);
                    errorDiv.textContent = error.message;
                    errorDiv.classList.remove('hidden');
                    updatePasswordSubmitBtn.innerHTML = originalText;
                    updatePasswordSubmitBtn.disabled = false;
                }
            });

            // Listen for Password Recovery auth state change
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    authForm.style.display = 'none';
                    resetForm.style.display = 'none';
                    updatePasswordForm.style.display = 'block';
                    toggleModeDiv.style.display = 'none';
                    forgotPasswordContainer.style.display = 'none';
                    formTitle.textContent = 'Create New Password';
                    formSubtitle.textContent = 'Enter your new secure password below.';
                }
            });
        });
    </script>
</body>
</html>
